<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rail-bg { fill: #f4f2ec; }
      .border { stroke: rgba(0,0,0,0.12); stroke-width: 0.5; fill: none; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #888780; letter-spacing: 0.5px; }
      .label-upper { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #888780; letter-spacing: 0.5px; text-transform: uppercase; }
      .course-title { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #1a1a1a; font-weight: 500; }
      .module-header { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #5f5e5a; letter-spacing: 0.3px; }
      .class-row { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #5f5e5a; }
      .class-active { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #185fa5; font-weight: 500; }
      .section-label { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #888780; letter-spacing: 0.5px; }
      .header-title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1a1a; font-weight: 500; }
      .breadcrumb { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #888780; }
      .btn { fill: #f4f2ec; rx: 6; ry: 6; }
      .btn-active { fill: #e6f1fb; rx: 6; ry: 6; }
      .btn-text { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #5f5e5a; }
      .btn-text-active { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #185fa5; font-weight: 500; }
      .pdf-bg { fill: #f9f8f5; }
      .ctrl-text { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #5f5e5a; }
      .footer-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #5f5e5a; }
      .asset-filename { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #1a1a1a; }
      .asset-meta { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #888780; }
      .audio-bar-bg { fill: #eae7dc; rx: 2; ry: 2; }
      .audio-bar-fill { fill: #185fa5; rx: 2; ry: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" class="bg" />

  <!-- Left rail -->
  <rect x="0" y="0" width="200" height="540" class="rail-bg" />
  <line x1="200" y1="0" x2="200" y2="540" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />

  <!-- Left rail content -->
  <text x="14" y="28" class="label-upper">COURSE</text>
  <text x="14" y="48" class="course-title">Spanish for Beginners</text>

  <text x="14" y="78" class="module-header">MODULE 1 · Foundations</text>

  <!-- Class rows -->
  <g>
    <circle cx="22" cy="98" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="101" class="class-row">Greetings</text>
  </g>
  <g>
    <circle cx="22" cy="118" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="121" class="class-row">Numbers 1-20</text>
  </g>
  <g>
    <!-- Active row background -->
    <rect x="6" y="129" width="188" height="22" rx="6" ry="6" fill="#e6f1fb" />
    <circle cx="22" cy="140" r="5" fill="#185fa5" />
    <text x="34" y="143" class="class-active">Basic Phrases</text>
  </g>
  <g>
    <circle cx="22" cy="162" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="165" class="class-row">The Alphabet</text>
  </g>

  <text x="14" y="196" class="module-header">MODULE 2 · Grammar</text>
  <g>
    <circle cx="22" cy="214" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="217" class="class-row">Articles &amp; Nouns</text>
  </g>
  <g>
    <circle cx="22" cy="234" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="237" class="class-row">Verb Conjugation</text>
  </g>
  <g>
    <circle cx="22" cy="254" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="257" class="class-row">Adjectives</text>
  </g>

  <text x="14" y="288" class="module-header">MODULE 3 · Conversation</text>
  <g>
    <circle cx="22" cy="306" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="309" class="class-row">At the Restaurant</text>
  </g>
  <g>
    <circle cx="22" cy="326" r="5" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="0.5" />
    <text x="34" y="329" class="class-row">Asking for Directions</text>
  </g>

  <!-- Right rail -->
  <rect x="760" y="0" width="200" height="540" class="rail-bg" />
  <line x1="760" y1="0" x2="760" y2="540" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />

  <!-- Right rail content -->
  <text x="774" y="28" class="label-upper">LESSON FILES</text>

  <text x="774" y="52" class="section-label">DOCUMENTS</text>

  <!-- PDF row 1 -->
  <rect x="774" y="62" width="30" height="16" rx="3" ry="3" fill="#fcebeb" />
  <text x="781" y="74" font-family="system-ui" font-size="8" fill="#a32d2d" font-weight="500">PDF</text>
  <text x="810" y="72" class="asset-filename">Lesson notes</text>
  <text x="810" y="84" class="asset-meta">4 pages · 245 KB</text>

  <!-- PDF row 2 -->
  <rect x="774" y="96" width="30" height="16" rx="3" ry="3" fill="#fcebeb" />
  <text x="781" y="108" font-family="system-ui" font-size="8" fill="#a32d2d" font-weight="500">PDF</text>
  <text x="810" y="106" class="asset-filename">Worksheet</text>
  <text x="810" y="118" class="asset-meta">2 pages · 128 KB</text>

  <text x="774" y="148" class="section-label">AUDIO</text>

  <!-- Audio row 1 -->
  <g>
    <circle cx="784" cy="168" r="9" fill="#f4f2ec" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />
    <text x="781" y="172" font-family="system-ui" font-size="9" fill="#1a1a1a">&#9654;</text>
    <text x="800" y="166" class="asset-filename">Walkthrough</text>
    <text x="920" y="166" class="asset-meta" text-anchor="end">3:42</text>
    <rect x="800" y="174" width="152" height="4" class="audio-bar-bg" />
    <rect x="800" y="174" width="45" height="4" class="audio-bar-fill" />
  </g>

  <!-- Audio row 2 -->
  <g>
    <circle cx="784" cy="202" r="9" fill="#f4f2ec" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />
    <text x="781" y="206" font-family="system-ui" font-size="9" fill="#1a1a1a">&#9654;</text>
    <text x="800" y="200" class="asset-filename">Q&amp;A Session</text>
    <text x="920" y="200" class="asset-meta" text-anchor="end">5:18</text>
    <rect x="800" y="208" width="152" height="4" class="audio-bar-bg" />
  </g>

  <text x="774" y="242" class="section-label">EXTRAS</text>
  <rect x="774" y="252" width="30" height="16" rx="3" ry="3" fill="#eae7dc" />
  <text x="781" y="264" font-family="system-ui" font-size="8" fill="#5f5e5a" font-weight="500">ZIP</text>
  <text x="810" y="262" class="asset-filename">Resources</text>
  <text x="810" y="274" class="asset-meta">1.2 MB</text>

  <!-- Main area header -->
  <text x="214" y="24" class="breadcrumb">Spanish for Beginners / Foundations</text>
  <text x="214" y="44" class="header-title">Basic Phrases</text>

  <!-- View toggle buttons -->
  <rect x="630" y="14" width="40" height="22" class="btn" />
  <text x="639" y="29" class="btn-text">Split</text>
  <rect x="674" y="14" width="42" height="22" class="btn-active" />
  <text x="680" y="29" class="btn-text-active">Video</text>
  <rect x="720" y="14" width="34" height="22" class="btn" />
  <text x="728" y="29" class="btn-text">PDF</text>

  <!-- Header border -->
  <line x1="200" y1="52" x2="760" y2="52" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />

  <!-- Video pane -->
  <rect x="200" y="52" width="560" height="240" fill="#1a1a1a" />
  <text x="214" y="68" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">VIDEO</text>

  <!-- Video selector dropdown -->
  <rect x="260" y="58" width="160" height="18" rx="6" ry="6" fill="rgba(0,0,0,0.45)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5" />
  <text x="270" y="70" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.8)">lesson-video.mp4</text>
  <text x="383" y="70" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.45)">1 of 2 &#9662;</text>

  <!-- Play button overlay -->
  <circle cx="480" cy="172" r="24" fill="rgba(255,255,255,0.15)" />
  <polygon points="472,158 472,186 496,172" fill="rgba(255,255,255,0.8)" />

  <!-- Video progress bar -->
  <rect x="220" y="272" width="520" height="4" rx="2" ry="2" fill="rgba(255,255,255,0.2)" />
  <rect x="220" y="272" width="180" height="4" rx="2" ry="2" fill="rgba(255,255,255,0.7)" />

  <!-- Split divider -->
  <rect x="200" y="292" width="560" height="6" fill="#f4f2ec" />
  <line x1="200" y1="292" x2="760" y2="292" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />
  <line x1="200" y1="298" x2="760" y2="298" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />
  <rect x="464" y="294" width="32" height="2" rx="1" ry="1" fill="rgba(0,0,0,0.2)" />

  <!-- PDF pane -->
  <rect x="200" y="298" width="560" height="204" class="pdf-bg" />

  <!-- PDF header bar -->
  <rect x="200" y="298" width="560" height="30" fill="#ffffff" />
  <line x1="200" y1="328" x2="760" y2="328" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />

  <!-- PDF selector -->
  <rect x="210" y="303" width="18" height="16" rx="3" ry="3" fill="#fcebeb" />
  <text x="213" y="315" font-family="system-ui" font-size="7" fill="#a32d2d" font-weight="500">PDF</text>
  <text x="234" y="315" class="ctrl-text">Lesson notes</text>
  <text x="310" y="315" class="asset-meta">1 of 2 &#9662;</text>

  <!-- PDF controls: zoom -->
  <text x="610" y="315" class="ctrl-text">&#8722;</text>
  <text x="626" y="315" class="ctrl-text">100%</text>
  <text x="656" y="315" class="ctrl-text">+</text>

  <!-- PDF controls: pages -->
  <line x1="672" y1="304" x2="672" y2="324" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />
  <text x="682" y="315" class="ctrl-text">&#8249;</text>
  <text x="698" y="315" class="ctrl-text">1 / 4</text>
  <text x="728" y="315" class="ctrl-text">&#8250;</text>

  <!-- PDF page mock -->
  <rect x="340" y="342" width="280" height="146" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="0.5" />
  <!-- Mock text lines -->
  <rect x="360" y="360" width="180" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="372" width="240" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="384" width="200" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="396" width="220" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="414" width="160" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="426" width="240" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="438" width="190" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="450" width="210" height="4" rx="1" ry="1" fill="#eae7dc" />
  <rect x="360" y="468" width="170" height="4" rx="1" ry="1" fill="#eae7dc" />

  <!-- Footer nav -->
  <rect x="200" y="502" width="560" height="38" fill="#ffffff" />
  <line x1="200" y1="502" x2="760" y2="502" stroke="rgba(0,0,0,0.12)" stroke-width="0.5" />
  <text x="224" y="525" class="footer-text">&#8249; Numbers 1-20</text>
  <text x="736" y="525" class="footer-text" text-anchor="end">The Alphabet &#8250;</text>

  <!-- URL bar hint -->
  <rect x="280" y="508" width="400" height="28" rx="6" ry="6" fill="#eae7dc" opacity="0" />
</svg>
